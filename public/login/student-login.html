<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ek Onker Boys PG - Student Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* Floating Shapes */
        .shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .shape {
            position: absolute;
            filter: blur(60px);
            opacity: 0.4;
            animation: float 20s infinite;
        }

        .shape1 {
            top: 10%;
            left: 10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #ff6b6b, #ff8e8e);
            border-radius: 50%;
        }

        .shape2 {
            bottom: 10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #4facfe, #00f2fe);
            border-radius: 50%;
            animation-delay: -5s;
        }

        .shape3 {
            top: 50%;
            right: 20%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #a18cd1, #fbc2eb);
            border-radius: 50%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(50px, 50px) scale(1.1); }
            50% { transform: translate(100px, -50px) scale(0.9); }
            75% { transform: translate(-50px, 100px) scale(1.05); }
        }

        /* Glassmorphism Container */
        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
            transform: translateY(0);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(102, 126, 234, 0.4);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 25s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-header i {
            font-size: 70px;
            background: white;
            color: #667eea;
            width: 120px;
            height: 120px;
            line-height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: pulse 2s infinite;
            position: relative;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .login-header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .login-header p {
            opacity: 0.9;
            font-size: 15px;
            position: relative;
            z-index: 1;
        }

        .login-body {
            padding: 40px 35px;
        }

        /* Welcome Back Message */
        .welcome-back {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-back h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .welcome-back p {
            color: #666;
            font-size: 14px;
        }

        .welcome-back p i {
            color: #667eea;
            margin: 0 3px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 16px;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 16px 15px 16px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
            transform: scale(1.02);
        }

        .input-group input:focus + i {
            color: #667eea;
            transform: scale(1.1);
        }

        .input-group input::placeholder {
            color: #aaa;
            font-size: 14px;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            left: auto !important;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .password-toggle:hover {
            color: #667eea;
            transform: scale(1.1);
        }

        /* Password Strength Indicator */
        .password-strength {
            margin-top: 8px;
            display: flex;
            gap: 5px;
        }

        .strength-bar {
            height: 4px;
            flex: 1;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .strength-bar.active.weak { background: #ff6b6b; }
        .strength-bar.active.medium { background: #ffd93d; }
        .strength-bar.active.strong { background: #6bcf7f; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
            transition: all 0.3s ease;
        }

        .remember-me:hover {
            color: #667eea;
        }

        .remember-me input {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #667eea;
            transition: width 0.3s ease;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102,126,234,0.4);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn i {
            font-size: 16px;
            transition: transform 0.3s ease;
        }

        .login-btn:hover i {
            transform: translateX(5px);
        }

        .login-btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }

        .login-btn.loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Demo Box with Animation */
        .demo-box {
            margin-top: 30px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 16px;
            padding: 25px;
            border: 2px dashed #667eea;
            animation: glow 2s infinite;
            transition: all 0.3s ease;
        }

        .demo-box:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(102,126,234,0.2);
        }

        @keyframes glow {
            0%, 100% { border-color: #667eea; }
            50% { border-color: #764ba2; }
        }

        .demo-box h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            margin-bottom: 20px;
            color: #333;
        }

        .demo-box h3 i {
            color: #667eea;
            font-size: 20px;
        }

        .credential-item {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #e0e0e0;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .credential-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .credential-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .credential-item p {
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .credential-item .value {
            color: #333;
            font-weight: 600;
            font-family: monospace;
            font-size: 16px;
        }

        .fill-demo {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .fill-demo::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .fill-demo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.4);
        }

        .fill-demo:hover::before {
            left: 100%;
        }

        .fill-demo i {
            font-size: 16px;
        }

        /* Role Links with Icons */
        .role-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .role-links a {
            text-decoration: none;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .role-links a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: currentColor;
            opacity: 0.1;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .role-links a:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .role-links a.student {
            background: rgba(102,126,234,0.1);
            color: #667eea;
        }

        .role-links a.manager {
            background: rgba(56,161,105,0.1);
            color: #38a169;
        }

        .role-links a.owner {
            background: rgba(159,122,234,0.1);
            color: #9f7aea;
        }

        .role-links a i {
            font-size: 14px;
        }

        .role-links a:hover {
            transform: translateY(-2px);
        }

        /* Alert Messages */
        .alert {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
        }

        .alert.error {
            background: #fee;
            color: #e53e3e;
            border-left: 4px solid #e53e3e;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #155724;
        }

        .alert i {
            font-size: 18px;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }
            
            .login-header i {
                width: 90px;
                height: 90px;
                line-height: 90px;
                font-size: 45px;
            }
            
            .login-header h1 {
                font-size: 26px;
            }
            
            .login-body {
                padding: 25px 20px;
            }
            
            .form-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .role-links {
                gap: 10px;
            }
            
            .role-links a {
                padding: 8px 15px;
                font-size: 13px;
            }
        }

        /* Tooltip */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px;
            background: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -60px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        /* Keyboard Shortcut Badge */
        .shortcut-badge {
            display: inline-block;
            background: #333;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            margin-left: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Floating Shapes -->
    <div class="shapes">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-user-graduate"></i>
                <h1>Ek Onker Boys PG</h1>
                <p>Student Portal</p>
            </div>

            <div class="login-body">
                <!-- Welcome Back Message -->
                <div class="welcome-back">
                    <h2>Welcome Back! 👋</h2>
                    <p><i class="fas fa-map-pin"></i> Room 326 • Akshay Kanojia <i class="fas fa-check-circle" style="color: #4CAF50;"></i></p>
                </div>

                <!-- Alert Messages -->
                <div class="alert error" id="errorAlert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage">Invalid credentials</span>
                </div>

                <div class="alert success" id="successAlert">
                    <i class="fas fa-check-circle"></i>
                    <span>Login successful! Redirecting...</span>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label><i class="fas fa-envelope" style="margin-right: 5px; color: #667eea;"></i> Email / UID</label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" value="student@pg.com" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label><i class="fas fa-lock" style="margin-right: 5px; color: #667eea;"></i> Password</label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" value="student123" placeholder="Enter your password" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                        <!-- Password Strength Indicator -->
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                            <div class="strength-bar"></div>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" checked> 
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password tooltip">
                            Forgot password?
                            <span class="tooltiptext">Contact manager</span>
                        </a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Login to Dashboard</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <!-- Demo Credentials Box -->
                <div class="demo-box">
                    <h3>
                        <i class="fas fa-flask"></i>
                        Demo Credentials
                        <span class="shortcut-badge">Ctrl+Shift+D</span>
                    </h3>
                    <div class="credential-item">
                        <p><i class="fas fa-user" style="margin-right: 5px;"></i> Email / UID</p>
                        <div class="value">student@pg.com</div>
                    </div>
                    <div class="credential-item">
                        <p><i class="fas fa-key" style="margin-right: 5px;"></i> Password</p>
                        <div class="value">student123</div>
                    </div>
                    <button class="fill-demo" id="fillDemoBtn">
                        <i class="fas fa-magic"></i> 
                        Auto-fill Credentials
                    </button>
                </div>

                <!-- Role Switcher -->
                <div class="role-links">
                    <a href="/login/student-login.html" class="student">
                        <i class="fas fa-user-graduate"></i>
                        Student
                    </a>
                    <a href="/login/manager-login.html" class="manager">
                        <i class="fas fa-user-tie"></i>
                        Manager
                    </a>
                    <a href="/login/owner-login.html" class="owner">
                        <i class="fas fa-crown"></i>
                        Owner
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Get DOM elements
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const loginBtn = document.getElementById('loginBtn');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');
        const successAlert = document.getElementById('successAlert');
        const fillDemoBtn = document.getElementById('fillDemoBtn');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const strengthBars = document.querySelectorAll('.strength-bar');

        // Toggle password visibility
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
            
            // Add animation
            this.style.transform = 'scale(1.2)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 200);
        });

        // Password strength indicator
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthBars.forEach((bar, index) => {
                bar.classList.remove('active', 'weak', 'medium', 'strong');
                if (index < strength) {
                    bar.classList.add('active');
                    if (strength <= 2) bar.classList.add('weak');
                    else if (strength <= 4) bar.classList.add('medium');
                    else bar.classList.add('strong');
                }
            });
        });

        // Fill demo credentials with animation
        fillDemoBtn.addEventListener('click', function() {
            emailInput.value = 'student@pg.com';
            passwordInput.value = 'student123';
            
            // Trigger strength indicator
            passwordInput.dispatchEvent(new Event('input'));
            
            // Add highlight animation
            emailInput.style.background = '#e8f4fd';
            passwordInput.style.background = '#e8f4fd';
            emailInput.style.transform = 'scale(1.02)';
            passwordInput.style.transform = 'scale(1.02)';
            
            setTimeout(() => {
                emailInput.style.background = '';
                passwordInput.style.background = '';
                emailInput.style.transform = '';
                passwordInput.style.transform = '';
            }, 500);

            // Show success toast
            showSuccess('Demo credentials filled!');
        });

        // Show error function
        function showError(msg) {
            errorMessage.textContent = msg;
            errorAlert.classList.add('show');
            successAlert.classList.remove('show');
            
            // Auto hide after 3 seconds
            setTimeout(() => {
                errorAlert.classList.remove('show');
            }, 3000);
        }

        // Show success function
        function showSuccess(msg) {
            const successSpan = successAlert.querySelector('span');
            successSpan.textContent = msg || 'Login successful! Redirecting...';
            successAlert.classList.add('show');
            errorAlert.classList.remove('show');
            
            setTimeout(() => {
                successAlert.classList.remove('show');
            }, 3000);
        }

        // Show loading overlay
        function showLoading(show) {
            if (show) {
                loadingOverlay.classList.add('show');
            } else {
                loadingOverlay.classList.remove('show');
            }
        }

        // Set loading state for button
        function setLoading(isLoading) {
            if (isLoading) {
                loginBtn.classList.add('loading');
                loginBtn.innerHTML = '<span class="spinner"></span><span>Logging in...</span>';
            } else {
                loginBtn.classList.remove('loading');
                loginBtn.innerHTML = '<span>Login to Dashboard</span><i class="fas fa-arrow-right"></i>';
            }
        }

        // Handle login form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            // Validation
            if (!email || !password) {
                showError('Please fill in all fields');
                emailInput.style.borderColor = '#e53e3e';
                passwordInput.style.borderColor = '#e53e3e';
                
                setTimeout(() => {
                    emailInput.style.borderColor = '';
                    passwordInput.style.borderColor = '';
                }, 2000);
                return;
            }

            // Email validation
            if (!email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            // Show loading
            setLoading(true);
            showLoading(true);

            // Simulate API call
            setTimeout(() => {
                if (email === 'student@pg.com' && password === 'student123') {
                    showSuccess();
                    
                    // Store user data
                    const userData = {
                        name: 'Akshay Kanojia',
                        email: 'akshaykanojia95@gmail.com',
                        role: 'student',
                        roomNo: '326',
                        loginTime: new Date().toISOString()
                    };
                    
                    localStorage.setItem('pgUser', JSON.stringify(userData));
                    localStorage.setItem('pgToken', 'demo-token-' + Date.now());
                    localStorage.setItem('pgRememberMe', document.querySelector('.remember-me input').checked);
                    
                    // Redirect after delay
                    setTimeout(() => {
                        window.location.href = '/dashboard/student-dashboard.html';
                    }, 1500);
                } else {
                    setLoading(false);
                    showLoading(false);
                    showError('Invalid email or password. Try using the demo credentials.');
                    
                    // Shake animation on error
                    document.querySelector('.login-card').style.animation = 'shake 0.5s ease';
                    setTimeout(() => {
                        document.querySelector('.login-card').style.animation = '';
                    }, 500);
                }
            }, 2000);
        });

        // Shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        // Check if already logged in
        if (localStorage.getItem('pgToken')) {
            const user = JSON.parse(localStorage.getItem('pgUser') || '{}');
            if (user.role === 'student') {
                showLoading(true);
                setTimeout(() => {
                    window.location.href = '/dashboard/student-dashboard.html';
                }, 1000);
            }
        }

        // Keyboard shortcut for demo fill (Ctrl+Shift+D)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                e.preventDefault();
                fillDemoBtn.click();
            }
        });

        // Add floating label effect
        const inputs = document.querySelectorAll('.input-group input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('i:first-child').style.color = '#667eea';
                this.parentElement.querySelector('i:first-child').style.transform = 'scale(1.1)';
            });
            
            input.addEventListener('blur', function() {
                if (!this.value) {
                    this.parentElement.querySelector('i:first-child').style.color = '#999';
                    this.parentElement.querySelector('i:first-child').style.transform = 'scale(1)';
                }
            });
        });

        // Add input validation on blur
        emailInput.addEventListener('blur', function() {
            if (this.value && !this.value.includes('@')) {
                this.style.borderColor = '#e53e3e';
            } else {
                this.style.borderColor = '';
            }
        });

        passwordInput.addEventListener('blur', function() {
            if (this.value && this.value.length < 6) {
                this.style.borderColor = '#e53e3e';
            } else {
                this.style.borderColor = '';
            }
        });

        console.log('✨ Student Login Page Enhanced Successfully!');
    </script>
</body>
</html>
