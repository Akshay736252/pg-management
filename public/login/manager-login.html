<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Life - Manager Login | Premium PG Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .bg-animation span:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .bg-animation span:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .bg-animation span:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .bg-animation span:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .bg-animation span:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .bg-animation span:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .bg-animation span:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .bg-animation span:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .bg-animation span:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
        }

        /* Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            overflow: hidden;
            transform: translateY(0);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Header with Wave Effect */
        .login-header {
            background: linear-gradient(135deg, #059669 0%, #047857 50%, #065f46 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        .login-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 30px;
            background: white;
            clip-path: path("M0,30 C150,0 350,0 500,30 L500,0 L0,0 Z");
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-header i {
            font-size: 70px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            width: 120px;
            height: 120px;
            line-height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .login-header p {
            opacity: 0.95;
            font-size: 15px;
            font-weight: 400;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Login Body */
        .login-body {
            padding: 35px 30px;
            background: white;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #1f2937;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i:not(.password-toggle) {
            position: absolute;
            left: 15px;
            color: #9ca3af;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: #f9fafb;
        }

        .input-group input:hover {
            background: white;
            border-color: #d1d5db;
        }

        .input-group input:focus {
            border-color: #059669;
            background: white;
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.2);
        }

        .input-group input:focus + i {
            color: #059669;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 15px;
            left: auto !important;
            cursor: pointer;
            color: #9ca3af;
            font-size: 18px;
            transition: all 0.3s;
            z-index: 2;
        }

        .password-toggle:hover {
            color: #059669;
        }

        /* Form Options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #4b5563;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #059669;
            cursor: pointer;
        }

        .forgot-password {
            color: #059669;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            position: relative;
        }

        .forgot-password::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #059669;
            transition: width 0.3s;
        }

        .forgot-password:hover::after {
            width: 100%;
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #059669, #047857);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -5px rgba(5, 150, 105, 0.5);
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn i {
            font-size: 18px;
            transition: transform 0.3s;
        }

        .login-btn:hover i {
            transform: translateX(5px);
        }

        .login-btn.loading {
            opacity: 0.8;
            cursor: not-allowed;
        }

        /* Demo Box */
        .demo-box {
            margin-top: 30px;
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border-radius: 16px;
            padding: 20px;
            border: 2px solid #059669;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.3); }
            50% { box-shadow: 0 0 0 10px rgba(5, 150, 105, 0); }
        }

        .demo-box h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            color: #065f46;
        }

        .demo-box h3 i {
            color: #059669;
            font-size: 20px;
        }

        .credential-item {
            background: white;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: 1px solid #bbf7d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .credential-item:hover {
            transform: translateX(5px);
            border-color: #059669;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .credential-item p {
            color: #4b5563;
            font-size: 13px;
            font-weight: 500;
            margin: 0;
        }

        .credential-item .value {
            color: #059669;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            background: #f0fdf4;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .fill-demo {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #059669, #047857);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .fill-demo:hover {
            background: white;
            color: #059669;
            border-color: #059669;
            transform: scale(1.02);
        }

        .fill-demo i {
            font-size: 16px;
        }

        /* Role Links */
        .role-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 2px solid #f3f4f6;
        }

        .role-links a {
            text-decoration: none;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .role-links a.student {
            color: #3b82f6;
            background: #eff6ff;
        }

        .role-links a.student:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(59,130,246,0.3);
        }

        .role-links a.manager {
            color: #059669;
            background: #f0fdf4;
            box-shadow: 0 4px 12px rgba(5,150,105,0.2);
        }

        .role-links a.manager:hover {
            background: #059669;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5,150,105,0.4);
        }

        .role-links a.owner {
            color: #7e5bef;
            background: #f5f3ff;
        }

        .role-links a.owner:hover {
            background: #7e5bef;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(126,91,239,0.3);
        }

        /* Alerts */
        .alert {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.show {
            display: flex;
        }

        .alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border-left: 4px solid #b91c1c;
            border-radius: 8px;
        }

        .alert.success {
            background: #f0fdf4;
            color: #065f46;
            border-left: 4px solid #059669;
            border-radius: 8px;
        }

        .alert i {
            font-size: 18px;
        }

        /* Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            body { padding: 10px; }
            
            .login-header { padding: 30px 20px; }
            
            .login-header i {
                width: 90px;
                height: 90px;
                line-height: 90px;
                font-size: 45px;
            }
            
            .login-header h1 { font-size: 24px; }
            
            .login-body { padding: 25px 20px; }
            
            .form-options {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            
            .role-links {
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .role-links a {
                padding: 8px 16px;
                font-size: 13px;
            }
        }

        /* Loading Skeleton Effect */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #059669, #047857);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #047857, #065f46);
        }

        /* Focus Visible Outline */
        :focus-visible {
            outline: 3px solid rgba(5, 150, 105, 0.5);
            outline-offset: 2px;
        }

        /* Selection Color */
        ::selection {
            background: #059669;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-user-tie"></i>
                <h1>Manager Login</h1>
                <p><i class="fas fa-map-marker-alt" style="margin-right: 5px;"></i> Welcome back! Manage your PG operations</p>
            </div>

            <div class="login-body">
                <!-- Alert Messages -->
                <div class="alert error" id="errorAlert">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorMessage">Invalid credentials</span>
                </div>

                <div class="alert success" id="successAlert">
                    <i class="fas fa-check-circle"></i>
                    <span>Login successful! Redirecting to dashboard...</span>
                </div>

                <!-- Login Form -->
                <form id="loginForm" novalidate>
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope" style="margin-right: 5px;"></i>
                            Email / Employee Code
                        </label>
                        <div class="input-group">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" value="manager@pg.com" placeholder="Enter your email or employee code" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock" style="margin-right: 5px;"></i>
                            Password
                        </label>
                        <div class="input-group">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" value="manager123" placeholder="Enter your password" required>
                            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" checked> 
                            <span>Remember me for 30 days</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Access Manager Dashboard</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="demo-box">
                    <h3>
                        <i class="fas fa-flask"></i>
                        Demo Access
                    </h3>
                    <div class="credential-item">
                        <p><i class="fas fa-user"></i> Email / Employee Code</p>
                        <span class="value">manager@pg.com</span>
                    </div>
                    <div class="credential-item">
                        <p><i class="fas fa-key"></i> Password</p>
                        <span class="value">manager123</span>
                    </div>
                    <button class="fill-demo" id="fillDemoBtn">
                        <i class="fas fa-magic"></i>
                        Auto-fill Demo Credentials
                    </button>
                </div>

                <!-- Role Switcher -->
                <div class="role-links">
                    <a href="/login/student-login.html" class="student">
                        <i class="fas fa-user-graduate"></i>
                        Student
                    </a>
                    <a href="/login/manager-login.html" class="manager">
                        <i class="fas fa-user-tie"></i>
                        Manager
                    </a>
                    <a href="/login/owner-login.html" class="owner">
                        <i class="fas fa-crown"></i>
                        Owner
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // DOM Elements
            const elements = {
                loginForm: document.getElementById('loginForm'),
                emailInput: document.getElementById('email'),
                passwordInput: document.getElementById('password'),
                togglePassword: document.getElementById('togglePassword'),
                loginBtn: document.getElementById('loginBtn'),
                errorAlert: document.getElementById('errorAlert'),
                errorMessage: document.getElementById('errorMessage'),
                successAlert: document.getElementById('successAlert'),
                fillDemoBtn: document.getElementById('fillDemoBtn')
            };

            // Validate elements exist
            for (const [key, element] of Object.entries(elements)) {
                if (!element) {
                    console.error(`Element ${key} not found`);
                    return;
                }
            }

            // Toggle Password Visibility
            elements.togglePassword.addEventListener('click', function() {
                const type = elements.passwordInput.type === 'password' ? 'text' : 'password';
                elements.passwordInput.type = type;
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
                
                // Announce for screen readers
                const announcement = document.createElement('div');
                announcement.setAttribute('aria-live', 'polite');
                announcement.classList.add('sr-only');
                announcement.textContent = type === 'text' ? 'Password visible' : 'Password hidden';
                document.body.appendChild(announcement);
                setTimeout(() => announcement.remove(), 1000);
            });

            // Fill Demo Credentials with Animation
            elements.fillDemoBtn.addEventListener('click', function() {
                // Animate the fill process
                elements.emailInput.style.transition = 'all 0.3s';
                elements.passwordInput.style.transition = 'all 0.3s';
                
                elements.emailInput.value = 'manager@pg.com';
                elements.passwordInput.value = 'manager123';
                
                // Highlight effect
                elements.emailInput.style.backgroundColor = '#d1fae5';
                elements.passwordInput.style.backgroundColor = '#d1fae5';
                elements.emailInput.style.borderColor = '#059669';
                elements.passwordInput.style.borderColor = '#059669';
                
                setTimeout(() => {
                    elements.emailInput.style.backgroundColor = '';
                    elements.passwordInput.style.backgroundColor = '';
                    elements.emailInput.style.borderColor = '';
                    elements.passwordInput.style.borderColor = '';
                }, 500);

                // Show success tip
                showSuccess('Demo credentials filled! Click login to continue.');
            });

            // Show Error Function
            function showError(message, duration = 3000) {
                elements.errorMessage.textContent = message;
                elements.errorAlert.classList.add('show');
                elements.successAlert.classList.remove('show');
                
                // Auto-hide after duration
                setTimeout(() => {
                    elements.errorAlert.classList.remove('show');
                }, duration);
            }

            // Show Success Function
            function showSuccess(message) {
                const successSpan = elements.successAlert.querySelector('span');
                if (successSpan) {
                    successSpan.textContent = message;
                }
                elements.successAlert.classList.add('show');
                elements.errorAlert.classList.remove('show');
                
                // Auto-hide after 2 seconds
                setTimeout(() => {
                    elements.successAlert.classList.remove('show');
                }, 2000);
            }

            // Set Loading State
            function setLoading(isLoading) {
                if (isLoading) {
                    elements.loginBtn.classList.add('loading');
                    elements.loginBtn.innerHTML = '<span class="spinner"></span><span>Authenticating...</span>';
                    elements.loginBtn.disabled = true;
                } else {
                    elements.loginBtn.classList.remove('loading');
                    elements.loginBtn.innerHTML = '<span>Access Manager Dashboard</span><i class="fas fa-arrow-right"></i>';
                    elements.loginBtn.disabled = false;
                }
            }

            // Validate Email Format
            function isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }

            // Handle Login Form Submit
            elements.loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = elements.emailInput.value.trim();
                const password = elements.passwordInput.value.trim();

                // Validation
                if (!email || !password) {
                    showError('⚠️ Please fill in all fields');
                    return;
                }

                if (!isValidEmail(email) && !email.includes('@')) {
                    // Allow employee codes without @ symbol
                    if (email.length < 3) {
                        showError('⚠️ Please enter a valid email or employee code');
                        return;
                    }
                }

                if (password.length < 6) {
                    showError('⚠️ Password must be at least 6 characters');
                    return;
                }

                // Show loading state
                setLoading(true);

                // Simulate API call with progress indication
                const progressMessages = [
                    'Connecting to server...',
                    'Verifying credentials...',
                    'Loading dashboard...'
                ];

                let messageIndex = 0;
                const messageInterval = setInterval(() => {
                    if (messageIndex < progressMessages.length) {
                        const successSpan = elements.successAlert.querySelector('span');
                        if (successSpan) {
                            successSpan.textContent = progressMessages[messageIndex];
                        }
                        elements.successAlert.classList.add('show');
                        messageIndex++;
                    }
                }, 500);

                // Simulate network delay
                setTimeout(() => {
                    clearInterval(messageInterval);
                    
                    // Demo authentication
                    if (email === 'manager@pg.com' && password === 'manager123') {
                        // Store user data
                        const userData = {
                            name: 'Mr. Singh',
                            email: email,
                            role: 'manager',
                            employeeCode: 'MGR001',
                            loginTime: new Date().toISOString(),
                            permissions: ['manage_rooms', 'manage_complaints', 'view_reports']
                        };
                        
                        localStorage.setItem('pgUser', JSON.stringify(userData));
                        localStorage.setItem('pgToken', 'mgr_' + Date.now() + '_' + Math.random().toString(36).substr(2));
                        localStorage.setItem('pgLoginTime', new Date().toISOString());
                        
                        // Show success and redirect
                        showSuccess('✓ Authentication successful! Redirecting...');
                        
                        setTimeout(() => {
                            window.location.href = '/dashboard/manager-dashboard.html';
                        }, 1500);
                    } else {
                        setLoading(false);
                        elements.successAlert.classList.remove('show');
                        showError('❌ Invalid email or password. Please try again.');
                    }
                }, 2000);
            });

            // Check if already logged in
            function checkExistingSession() {
                const token = localStorage.getItem('pgToken');
                const user = localStorage.getItem('pgUser');
                const loginTime = localStorage.getItem('pgLoginTime');
                
                if (token && user) {
                    try {
                        const userData = JSON.parse(user);
                        const timeDiff = loginTime ? (Date.now() - new Date(loginTime).getTime()) / 1000 / 60 : 0;
                        
                        // Session valid for 8 hours
                        if (userData.role === 'manager' && timeDiff < 480) {
                            // Show brief message then redirect
                            showSuccess('✓ Found existing session! Redirecting...');
                            setTimeout(() => {
                                window.location.href = '/dashboard/manager-dashboard.html';
                            }, 1000);
                        } else if (timeDiff >= 480) {
                            // Session expired
                            localStorage.removeItem('pgToken');
                            localStorage.removeItem('pgUser');
                            localStorage.removeItem('pgLoginTime');
                        }
                    } catch (e) {
                        console.error('Error parsing user data:', e);
                        localStorage.clear();
                    }
                }
            }

            // Run session check on load
            checkExistingSession();

            // Add keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                // Ctrl/Cmd + D to fill demo credentials
                if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                    e.preventDefault();
                    elements.fillDemoBtn.click();
                }
                
                // Escape to clear forms
                if (e.key === 'Escape') {
                    elements.emailInput.value = '';
                    elements.passwordInput.value = '';
                    showSuccess('✓ Form cleared');
                }
            });

            // Add input animations
            const inputs = [elements.emailInput, elements.passwordInput];
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.querySelector('i:first-child').style.color = '#059669';
                });
                
                input.addEventListener('blur', function() {
                    if (!this.value) {
                        this.parentElement.querySelector('i:first-child').style.color = '#9ca3af';
                    }
                });
            });

            // Prevent form resubmission on page refresh
            if (window.history.replaceState) {
                window.history.replaceState(null, null, window.location.href);
            }

            // Add smooth scroll to top on load
            window.scrollTo({ top: 0, behavior: 'smooth' });

        })();
    </script>

    <!-- Add hidden styles for accessibility -->
    <style>
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
        
        /* Loading progress bar */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        
        .loading-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #059669, #047857);
            animation: progress 2s ease-out;
        }
    </style>
</body>
</html>
